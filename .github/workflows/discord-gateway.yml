# Mantiene el Gateway de Discord (los @mention no llegan solo por webhooks en Vercel).
# Necesario si no tenés Vercel Cron (plan Pro). Mínimo intervalo en GitHub: 5 minutos.
name: Discord Gateway

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Gateway listener on Vercel
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set GitHub secrets APP_URL and CRON_SECRET"
            exit 1
          fi
          curl -fsS -m 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/discord/gateway"
